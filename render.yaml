services:
    - type: web
    name: smart-lender-ai
    env: python
    plan: free
    pythonVersion: 3.11.7
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
